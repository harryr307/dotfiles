# #######################################################################################
# DESKEDIT HYPRLAND CONFIG.
# #######################################################################################

source = ~/.cache/wal/colors-hyprland.conf

################
### MONITORS ###
################

monitor=Unknown-1,1600x900@60,0x0,1

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$interminal = $terminal -e
$fileManager = thunar
$menu = rofi -show drun
$browser = zen-browser
$lockscreen = hyprlock

# Set cursor and cursor size
$cursor = Moga-White
$cursorSize = 15

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = NEXTDOTS_SHELL_THEME,nextshell
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

#################
### AUTOSTART ###
#################

exec-once = qs -c $NEXTDOTS_SHELL_THEME & swww-daemon & nm-applet &
exec-once = hyprctl setcursor $cursor $cursorSize &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = hyprctl dispatch submap reset & hypridle &
exec-once = systemctl --user start hyprpolkitagent

###################
### PERMISSIONS ###
###################

permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 5

    border_size = 2 

    col.active_border = $color4 $color5 45deg
    col.inactive_border = $background

    resize_on_border = false 

    allow_tearing = false

    layout = master
}

decoration {
    rounding = 5
    rounding_power = 3

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 1
        passes = 4

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    # Curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

  # Animations
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint, slide
    animation = windowsIn,     1,     4.1,   easeOutQuint, slide#popin 87%
    animation = windowsOut,    1,     1.49,  linear,       slide#popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint
    animation = layersOut,     1,     1.5,   linear
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, slide
    animation = workspacesIn,  1,     1.94,  almostLinear, slide
    animation = workspacesOut, 1,     1.94,  almostLinear, slide
    animation = zoomFactor,    1,     7,     quick
}

# Layouts

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

# Misc

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

cursor:no_warps = true

#############
### INPUT ###
#############

input {
    kb_layout = us, ca
    kb_variant =
    kb_model =
    #kb_options = caps:swapescape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.5 # -1.0 to 1.0, 0 means no modification
    accel_profile = flat

    touchpad {
        natural_scroll = true 
    }
}

# Gestures
gesture = 3, horizontal, workspace

# Mouse
device {
    name = epic-mouse-v1
    sensitivity = -0.5 
}

###################
### KEYBINDINGS ###
###################

$mainMod = ALT

bind = $mainMod, A, exec, hyprctl switchxkblayout all next

bind = $mainMod, B, exec, ~/.config/hypr/scripts/rofi_wallsmenu.sh && ~/.config/hypr/scripts/reload-ui.sh
bind = SUPER ALT, B, exec, ~/.config/hypr/scripts/rofi_wallsmenu_light.sh && ~/.config/hypr/scripts/reload-ui.sh

bind = $mainMod, G, togglegroup,
bind = $mainMod, J, changegroupactive, b
bind = $mainMod, K, changegroupactive, f

bind = $mainMod, S, exec, hyprshot -m active -m output -o ~/Pictures/Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m window -m active -o ~/Pictures/Screenshots
bind = SUPER ALT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots

# Reload UI with mainMod + shift + b
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/reload-ui.sh

# Make current window fullscreen with mainMod + F
bind = $mainMod, F, fullscreen

#bind = $mainMod, R, exec, hyprland-run # Hyprland run box
bind = $mainMod, C, killactive, # Close active window
bind = $mainMod, E, exec, $fileManager # Open file manager
bind = $mainMod, V, togglefloating, # Toggle floating on active window
bind = $mainMod, SPACE, exec, $menu # Launcher
bind = $mainMod, W, exec, $browser # Run web browser
bind = $mainMod, M, exec, ~/.config/hypr/scripts/rofi_powermenu.sh # Open power menu
bind = $mainMod, Q, exec, $terminal # Terminal

# Move focus with mainMod + arrow keys / vim keys
bind = $mainMod,  left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod,    up, movefocus, u
bind = $mainMod,  down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainMod + Shift + arrow keys / vim keys
bind = $mainMod SHIFT,  left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT,    up, movewindow, u
bind = $mainMod SHIFT,  down, movewindow, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows with mainMod + Alt + arrow keys / vim keys
bind = SUPER ALT,  left, resizeactive, -100   0
bind = SUPER ALT, right, resizeactive,  100   0
bind = SUPER ALT,    up, resizeactive,  0  -100
bind = SUPER ALT,  down, resizeactive,  0   100

bind = SUPER ALT, h, resizeactive, -100   0
bind = SUPER ALT, l, resizeactive,  100   0
bind = SUPER ALT, k, resizeactive,  0  -100
bind = SUPER ALT, j, resizeactive,  0   100

# Cycle through applications on active workspace
bind = $mainMod,       TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev
bind = $mainMod,       TAB, bringactivetotop
bind = $mainMod SHIFT, TAB, bringactivetotop

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6
bind = SUPER ALT, 7, movetoworkspacesilent, 7
bind = SUPER ALT, 8, movetoworkspacesilent, 8
bind = SUPER ALT, 9, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

submap = screensaver

bind = $mainMod, escape, submap, reset

submap = reset
